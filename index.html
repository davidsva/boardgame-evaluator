<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Board Game Evaluator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1714; --paper: #f5f0e8; --cream: #ede8dc;
    --accent: #c0392b; --accent2: #2c6e49; --gold: #b8860b;
    --muted: #7a7060; --border: #c8bfaa; --card: #faf7f2;
  }
  body { background: var(--paper); font-family: 'DM Sans', sans-serif; color: var(--ink); min-height: 100vh; max-width: 640px; margin: 0 auto; }

  .header { background: var(--ink); padding: 24px 28px 20px; position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(255,255,255,.015) 8px,rgba(255,255,255,.015) 9px); }
  .eyebrow { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:6px; }
  .htitle { font-family:'Playfair Display',serif; font-size:24px; color:#f5f0e8; position:relative; }
  .hsub { font-size:12px; color:rgba(245,240,232,.5); margin-top:5px; font-weight:300; }

  .steps { display:flex; align-items:center; padding:14px 24px 0; }
  .step { display:flex; align-items:center; gap:5px; }
  .step-dot { width:20px; height:20px; border-radius:50%; border:1.5px solid var(--border); background:var(--card); display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); transition:all .2s; flex-shrink:0; }
  .step.active .step-dot { background:var(--ink); border-color:var(--ink); color:var(--paper); }
  .step.done .step-dot { background:var(--accent2); border-color:var(--accent2); color:#fff; }
  .step-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
  .step.active .step-label { color:var(--ink); }
  .step.done .step-label { color:var(--accent2); }
  .step-line { flex:1; height:1px; background:var(--border); margin:0 8px; }

  .panel { display:none; animation:fadeIn .3s ease; }
  .panel.active { display:block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

  .q-section { padding:18px 24px 0; }
  .q-progress { height:3px; background:var(--cream); border-radius:2px; margin-bottom:18px; overflow:hidden; }
  .q-fill { height:100%; background:var(--gold); border-radius:2px; transition:width .4s ease; }
  .q-card { background:var(--card); border:1.5px solid var(--border); border-radius:8px; padding:18px; }
  .q-number { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--muted); margin-bottom:8px; }
  .q-text { font-family:'Playfair Display',serif; font-size:16px; line-height:1.5; margin-bottom:16px; }

  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { padding:8px 14px; border:1.5px solid var(--border); border-radius:20px; background:var(--paper); cursor:pointer; font-size:12px; transition:all .15s; user-select:none; }
  .chip:hover { border-color:var(--ink); background:var(--cream); }
  .chip.sel { border-color:var(--ink); background:var(--ink); color:var(--paper); }
  .chip-hint { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); margin-bottom:10px; letter-spacing:.5px; }

  .binary { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .bin-btn { padding:14px 10px; border:1.5px solid var(--border); border-radius:6px; background:var(--paper); cursor:pointer; font-size:13px; text-align:center; font-weight:500; transition:all .15s; }
  .bin-btn:hover { border-color:var(--ink); background:var(--cream); }
  .bin-btn.sel { border-color:var(--ink); background:var(--ink); color:var(--paper); }
  .bin-label { font-size:11px; opacity:.6; margin-top:3px; font-weight:300; display:block; }

  .q-nav { display:flex; gap:10px; padding:14px 24px 0; }
  .btn-back { padding:10px 14px; background:transparent; color:var(--muted); border:1.5px solid var(--border); border-radius:4px; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:1px; cursor:pointer; transition:all .2s; }
  .btn-back:hover { border-color:var(--ink); color:var(--ink); }
  .btn-next { flex:1; padding:10px; background:var(--ink); color:var(--paper); border:none; border-radius:4px; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:background .2s; }
  .btn-next:hover { background:#333; }
  .btn-next:disabled { opacity:.35; cursor:not-allowed; }

  .profile-section { padding:18px 24px 0; }
  .profile-card { background:var(--ink); border-radius:8px; padding:18px 20px; margin-bottom:14px; }
  .p-title { font-family:'Playfair Display',serif; font-size:20px; color:var(--gold); margin-bottom:4px; }
  .p-desc { font-size:12px; color:rgba(245,240,232,.55); font-weight:300; line-height:1.6; margin-bottom:16px; }
  .weights-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .w-item { background:rgba(255,255,255,.06); border-radius:5px; padding:9px 12px; }
  .w-name { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1px; color:rgba(245,240,232,.45); text-transform:uppercase; margin-bottom:4px; }
  .w-bar { height:4px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden; margin-bottom:3px; }
  .w-fill { height:100%; border-radius:2px; transition:width .6s ease; }
  .w-pct { font-family:'DM Mono',monospace; font-size:11px; color:rgba(245,240,232,.65); }
  .btn-proceed { width:calc(100% - 48px); margin:12px 24px 0; padding:12px; background:var(--accent2); color:#fff; border:none; border-radius:4px; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:background .2s; }
  .btn-proceed:hover { background:#235c3c; }

  .field-label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; display:block; }
  .gsearch { padding:18px 24px 0; }
  .grow { display:flex; gap:10px; }
  .ginput { flex:1; padding:10px 14px; border:1.5px solid var(--border); background:var(--card); font-family:'DM Sans',sans-serif; font-size:14px; color:var(--ink); border-radius:4px; outline:none; transition:border-color .2s; }
  .ginput:focus { border-color:var(--ink); }
  .ginput::placeholder { color:var(--muted); font-weight:300; }
  .gbtn { padding:10px 14px; background:var(--ink); color:var(--paper); border:none; border-radius:4px; font-family:'DM Mono',monospace; font-size:11px; cursor:pointer; }
  .gbtn:hover { background:#333; }
  .gcard { margin:14px 24px 0; background:var(--card); border:1.5px solid var(--border); border-radius:6px; padding:12px 14px; display:none; align-items:center; gap:12px; }
  .gthumb { width:44px; height:44px; background:var(--cream); border:1.5px solid var(--border); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .gname { font-family:'Playfair Display',serif; font-size:14px; font-weight:700; }
  .gtags { display:flex; gap:5px; margin-top:3px; flex-wrap:wrap; }
  .gtag { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1px; text-transform:uppercase; padding:2px 6px; border-radius:2px; background:var(--cream); color:var(--muted); border:1px solid var(--border); }

  .divider { margin:18px 24px 0; border:none; border-top:1px solid var(--border); position:relative; }
  .divider::after { content:'CRITERIA'; position:absolute; top:-8px; left:50%; transform:translateX(-50%); background:var(--paper); padding:0 10px; font-family:'DM Mono',monospace; font-size:9px; letter-spacing:3px; color:var(--muted); }

  .criteria-grid { padding:18px 24px 0; display:flex; flex-direction:column; gap:12px; }
  .criterion { background:var(--card); border:1.5px solid var(--border); border-radius:6px; padding:12px 14px; }
  .crit-top { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:3px; }
  .crit-name { font-family:'Playfair Display',serif; font-size:14px; font-weight:700; }
  .crit-badge { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1px; padding:2px 6px; border-radius:2px; background:var(--cream); color:var(--muted); border:1px solid var(--border); }
  .crit-badge.hi { background:#fdf3e3; color:#8a5e0a; border-color:#e8c97a; }
  .crit-desc { font-size:11px; color:var(--muted); font-weight:300; margin-bottom:10px; line-height:1.5; }

  .verbal-row { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin-bottom:6px; }
  .vbtn { padding:7px 2px; border:1.5px solid var(--border); border-radius:4px; background:var(--cream); cursor:pointer; font-size:10px; font-weight:500; text-align:center; transition:all .15s; line-height:1.2; color:var(--ink); }
  .vbtn:hover { border-color:var(--ink); }
  .vbtn .vsub { font-size:8px; font-weight:300; color:var(--muted); display:block; margin-top:1px; font-family:'DM Mono',monospace; }
  .vbtn.sel { color:#fff; border-color:transparent; }
  .vbtn.sel .vsub { color:rgba(255,255,255,.6); }
  .slider-labels { display:flex; justify-content:space-between; font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); }

  .radar-wrap { padding:16px 24px 0; }
  .radar-box { background:var(--card); border:1.5px solid var(--border); border-radius:8px; padding:16px; display:flex; flex-direction:column; align-items:center; }
  .radar-title { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; align-self:flex-start; }
  .overall-row { display:flex; align-items:center; gap:16px; margin-top:12px; width:100%; }
  .overall-num { font-family:'Playfair Display',serif; font-size:36px; color:var(--gold); font-weight:700; line-height:1; flex-shrink:0; }
  .overall-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  .overall-profile { font-size:12px; color:var(--muted); margin-top:3px; font-weight:300; }

  .notes-section { padding:14px 24px 0; }
  .notes-input { width:100%; padding:10px 14px; border:1.5px solid var(--border); background:var(--card); font-family:'DM Sans',sans-serif; font-size:13px; color:var(--ink); border-radius:4px; outline:none; resize:vertical; min-height:60px; line-height:1.5; }
  .notes-input:focus { border-color:var(--ink); }
  .notes-input::placeholder { color:var(--muted); font-weight:300; }

  .actions { padding:14px 24px 20px; display:flex; gap:10px; }
  .btn-submit { flex:1; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:4px; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition: all .2s; }
  .btn-submit:hover { background:#a93226; }
  .btn-submit:disabled { opacity:.5; cursor:not-allowed; }
  .btn-reset { padding:12px 14px; background:transparent; color:var(--muted); border:1.5px solid var(--border); border-radius:4px; font-family:'DM Mono',monospace; font-size:11px; cursor:pointer; transition:all .2s; }
  .btn-reset:hover { border-color:var(--ink); color:var(--ink); }

  .retake-link { text-align:center; padding:8px 24px 0; font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); cursor:pointer; letter-spacing:1px; }
  .retake-link:hover { color:var(--ink); }
  .retake-link span { text-decoration:underline; }

  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(60px); color:#fff; padding:10px 22px; border-radius:4px; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1px; transition:transform .3s cubic-bezier(.34,1.56,.64,1); z-index:100; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast.success { background: var(--accent2); }
  .toast.error { background: var(--accent); }

  .validation-msg { padding: 8px 24px 0; font-family:'DM Mono',monospace; font-size:10px; color: var(--accent); letter-spacing:.5px; display:none; }
  .validation-msg.show { display:block; }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">Board Game Evaluator</div>
  <div class="htitle" id="headerTitle">Your Gamer Profile</div>
  <div class="hsub" id="headerSub">A quick questionnaire to personalise your score weights</div>
</div>

<div class="steps" id="stepIndicator">
  <div class="step active" id="step-q"><div class="step-dot">1</div><span class="step-label">Profile</span></div>
  <div class="step-line"></div>
  <div class="step" id="step-p"><div class="step-dot">2</div><span class="step-label">Weights</span></div>
  <div class="step-line"></div>
  <div class="step" id="step-r"><div class="step-dot">3</div><span class="step-label">Rate</span></div>
</div>

<div class="panel active" id="panelQ">
  <div class="q-section">
    <div class="q-progress"><div class="q-fill" id="qFill" style="width:0%"></div></div>
    <div class="q-card">
      <div class="q-number" id="qNumber"></div>
      <div class="q-text" id="qText"></div>
      <div id="qHint" class="chip-hint"></div>
      <div id="qOptions"></div>
    </div>
  </div>
  <div class="q-nav">
    <button class="btn-back" id="btnBack" onclick="prevQ()" style="display:none">← BACK</button>
    <button class="btn-next" id="btnNext" onclick="nextQ()" disabled>NEXT →</button>
  </div>
</div>

<div class="panel" id="panelP">
  <div class="profile-section">
    <div class="profile-card">
      <div class="p-title" id="profileName"></div>
      <div class="p-desc" id="profileDesc"></div>
      <div class="weights-grid" id="weightsGrid"></div>
    </div>
  </div>
  <button class="btn-proceed" onclick="goToRating()">START RATING GAMES →</button>
  <div class="retake-link" onclick="retakeQuiz()">↺ <span>Retake questionnaire</span></div>
  <div style="height:16px"></div>
</div>

<div class="panel" id="panelR">
  <div class="gsearch">
    <label class="field-label">Game title</label>
    <div class="grow">
      <input class="ginput" id="gameInput" type="text" placeholder="e.g. Wingspan, Gloomhaven, Catan…">
      <button class="gbtn" onclick="loadGame()">LOAD →</button>
    </div>
  </div>
  <div class="gcard" id="gameCard">
    <div class="gthumb" id="gameThumb">🎲</div>
    <div><div class="gname" id="gameNameD"></div><div class="gtags" id="gameTagsD"></div></div>
  </div>
  <hr class="divider">
  <div class="criteria-grid" id="criteriaGrid"></div>
  <div class="radar-wrap">
    <div class="radar-box">
      <div class="radar-title">Score overview</div>
      <canvas id="radarCanvas" width="280" height="280"></canvas>
      <div class="overall-row">
        <div class="overall-num" id="overallNum">—</div>
        <div class="overall-meta">
          <div class="overall-label">Weighted score</div>
          <div class="overall-profile" id="overallProfile"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="notes-section">
    <label class="field-label">Notes &amp; impressions</label>
    <textarea class="notes-input" id="notes" placeholder="What stood out? Best moment? Who would you recommend it to?"></textarea>
  </div>
  <div class="validation-msg" id="validationMsg">Please rate all 6 criteria and enter a game name before submitting.</div>
  <div class="actions">
    <button class="btn-submit" id="btnSubmit" onclick="submitRating()">SUBMIT RATING</button>
    <button class="btn-reset" onclick="resetRating()">RESET</button>
  </div>
  <div class="retake-link" onclick="retakeQuiz()">↺ <span>Change gamer profile</span></div>
  <div style="height:16px"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── SUPABASE INIT ──
  const SUPABASE_URL = 'https://vkvkdfnonhynusipypgx.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrdmtkZm5vbmh5bnVzaXB5cGd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3ODcwMzYsImV4cCI6MjA4OTM2MzAzNn0.p3ulppuYyzYqiizYz6AEAvhyvYARuKfEwTqUheJZ6f4';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const CRITERIA = [
  { id:'complexity', name:'Complexity',         desc:'Learning curve — rules, mechanics, iconography.',         lo:'Very easy',    hi:'Very complex',  color:'#7f77dd', verbal:['Trivial','Easy','Moderate','Crunchy','Brutal'] },
  { id:'depth',      name:'Depth',              desc:'Strategy, long-term planning, decision space.',           lo:'Light',        hi:'Deep',          color:'#378add', verbal:['Filler','Light','Solid','Rich','Masterwork'] },
  { id:'luck',       name:'Luck vs. skill',     desc:'Randomness vs. player agency. High = skill-driven.',     lo:'Pure luck',    hi:'Pure skill',    color:'#ba7517', verbal:['Pure luck','Luck-heavy','Balanced','Skill-leaning','Pure skill'] },
  { id:'interaction',name:'Player interaction', desc:'Conflict, negotiation, social dynamics.',                 lo:'Solitaire',    hi:'High conflict', color:'#d85a30', verbal:['Solitary','Low-key','Present','Intense','Cutthroat'] },
  { id:'table',      name:'Table experience',   desc:'Pace, downtime, fun factor, player count flexibility.',  lo:'Painful',      hi:'Delightful',    color:'#1d9e75', verbal:['Painful','Meh','Fine','Great','Brilliant'] },
  { id:'production', name:'Production',         desc:'Setup time, component quality, box organisation.',       lo:'Poor',         hi:'Excellent',     color:'#888780', verbal:['Flimsy','Basic','Decent','Premium','Stunning'] },
];

const QUESTIONS = [
  { type:'multi', text:"Which of these appeal to you in a board game? Pick all that apply.", hint:"Select one or more",
    options:[
      { label:"Deep strategy",          d:{ depth:+1.0, complexity:+0.4 } },
      { label:"Social chaos",           d:{ interaction:+1.0, table:+0.5 } },
      { label:"Beautiful components",   d:{ production:+1.2 } },
      { label:"Quick to learn",         d:{ complexity:-0.8, table:+0.5 } },
      { label:"Tight skill expression", d:{ luck:+1.2, depth:+0.5 } },
      { label:"Chill atmosphere",       d:{ table:+0.8, luck:+0.3 } },
    ]},
  { type:'binary', text:"A dice roll wipes out your best-laid plan. How do you feel?",
    options:[
      { label:"Frustrated", sub:"I want to earn wins",   d:{ luck:+1.5, depth:+0.4 } },
      { label:"Entertained", sub:"Chaos keeps it fresh", d:{ luck:-0.6, table:+0.6 } },
    ]},
  { type:'binary', text:"What's your preferred player dynamic?",
    options:[
      { label:"Conflict", sub:"Trading blows, backstabbing", d:{ interaction:+1.4, luck:+0.2 } },
      { label:"Parallel", sub:"Everyone in their own lane",  d:{ interaction:-0.6, depth:+0.8 } },
    ]},
  { type:'multi', text:"Which of these game nights sound most appealing? Pick all that apply.", hint:"Select one or more",
    options:[
      { label:"3-hour epic with friends",   d:{ depth:+1.0, complexity:+0.5 } },
      { label:"Quick 20-min filler",        d:{ table:+0.8, complexity:-0.5 } },
      { label:"Cooperative puzzle-solving", d:{ depth:+0.7, interaction:+0.3 } },
      { label:"Negotiation & trading",      d:{ interaction:+1.0, table:+0.4 } },
      { label:"Solo campaign at my pace",   d:{ depth:+0.6, interaction:-0.4 } },
    ]},
  { type:'binary', text:"New game night, 30-page rulebook on the table. Your reaction?",
    options:[
      { label:"Let's dig in", sub:"Complexity is rewarding",        d:{ complexity:+1.3, depth:+0.5 } },
      { label:"Hard pass",   sub:"Teach me in 5 min or forget it",  d:{ complexity:-1.2, table:+0.8 } },
    ]},
  { type:'binary', text:"How much do component quality and presentation matter to you?",
    options:[
      { label:"A lot",    sub:"It elevates the whole experience", d:{ production:+1.4 } },
      { label:"Not much", sub:"Gameplay is everything",           d:{ production:-0.8, depth:+0.3 } },
    ]},
];

const PROFILES = [
  { name:"The Grand Strategist",    top:['depth','complexity'],  desc:"You crave mental challenge. Games are puzzles to be mastered, not just played." },
  { name:"The Social Butterfly",    top:['interaction','table'], desc:"The people matter as much as the game. You live for negotiation, chaos and memories." },
  { name:"The Skill Purist",        top:['luck','depth'],        desc:"Luck is the enemy. Every win should be earned through skill and foresight." },
  { name:"The Casual Enjoyer",      top:['table','luck'],        desc:"Games are about fun, not stress. Accessible, breezy experiences are your sweet spot." },
  { name:"The Component Collector", top:['production','table'],  desc:"You appreciate craftsmanship. A beautifully made game in good company is the dream." },
  { name:"The Tactician",           top:['depth','interaction'], desc:"You thrive on reading opponents and making sharp in-the-moment decisions." },
];

let currentQ = 0;
let answers = [];
for (let i=0;i<QUESTIONS.length;i++) answers.push(QUESTIONS[i].type==='multi'?new Set():null);
let weights = {};
let profileLabel = '';

function initWeights() { CRITERIA.forEach(c => weights[c.id] = 1.0); }
initWeights();
const scores = {};
CRITERIA.forEach(c => scores[c.id] = null);

function renderQ() {
  const q = QUESTIONS[currentQ];
  document.getElementById('qNumber').textContent = `Question ${currentQ+1} of ${QUESTIONS.length}`;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('qFill').style.width = (currentQ/QUESTIONS.length*100)+'%';
  document.getElementById('btnBack').style.display = currentQ>0?'block':'none';
  document.getElementById('btnNext').textContent = currentQ===QUESTIONS.length-1?'SEE MY PROFILE →':'NEXT →';
  document.getElementById('qHint').textContent = q.hint||'';
  const container = document.getElementById('qOptions');
  container.innerHTML='';
  if (q.type==='multi') {
    const sel=answers[currentQ], div=document.createElement('div');
    div.className='chips';
    q.options.forEach((opt,i)=>{
      const chip=document.createElement('div');
      chip.className='chip'+(sel.has(i)?' sel':'');
      chip.textContent=opt.label;
      chip.onclick=()=>{ sel.has(i)?sel.delete(i):sel.add(i); renderQ(); };
      div.appendChild(chip);
    });
    container.appendChild(div);
  } else {
    const div=document.createElement('div');
    div.className='binary';
    q.options.forEach((opt,i)=>{
      const btn=document.createElement('div');
      btn.className='bin-btn'+(answers[currentQ]===i?' sel':'');
      btn.innerHTML=`${opt.label}<span class="bin-label">${opt.sub||''}</span>`;
      btn.onclick=()=>{ answers[currentQ]=i; renderQ(); };
      div.appendChild(btn);
    });
    container.appendChild(div);
  }
  const ok=q.type==='multi'?answers[currentQ].size>0:answers[currentQ]!==null;
  document.getElementById('btnNext').disabled=!ok;
}

function nextQ() {
  const q=QUESTIONS[currentQ];
  const ok=q.type==='multi'?answers[currentQ].size>0:answers[currentQ]!==null;
  if(!ok) return;
  if(currentQ<QUESTIONS.length-1){currentQ++;renderQ();}
  else{computeWeights();showProfile();}
}
function prevQ(){if(currentQ>0){currentQ--;renderQ();}}

function computeWeights(){
  initWeights();
  QUESTIONS.forEach((q,qi)=>{
    if(q.type==='multi'){
      answers[qi].forEach(i=>{ Object.entries(q.options[i].d).forEach(([id,d])=>{ if(weights[id]!==undefined) weights[id]=Math.max(0.1,weights[id]+d); }); });
    } else if(answers[qi]!==null){
      Object.entries(q.options[answers[qi]].d).forEach(([id,d])=>{ if(weights[id]!==undefined) weights[id]=Math.max(0.1,weights[id]+d); });
    }
  });
  const total=Object.values(weights).reduce((a,b)=>a+b,0);
  CRITERIA.forEach(c=>weights[c.id]=weights[c.id]/total*6);
}

function showProfile(){
  const sorted=[...CRITERIA].sort((a,b)=>weights[b.id]-weights[a.id]);
  const top2=sorted.slice(0,2).map(c=>c.id);
  let profile=PROFILES.find(p=>p.top[0]===top2[0]&&p.top[1]===top2[1])||PROFILES.find(p=>p.top.includes(top2[0]))||PROFILES[0];
  profileLabel=profile.name;
  document.getElementById('profileName').textContent=profile.name;
  document.getElementById('profileDesc').textContent=profile.desc;
  const maxW=Math.max(...Object.values(weights));
  document.getElementById('weightsGrid').innerHTML=CRITERIA.map(c=>{
    const pct=Math.round(weights[c.id]/maxW*100);
    return `<div class="w-item"><div class="w-name">${c.name}</div><div class="w-bar"><div class="w-fill" style="width:${pct}%;background:${c.color}"></div></div><div class="w-pct">${Math.round(weights[c.id]*100/6)}%</div></div>`;
  }).join('');
  setStep(2);
  document.getElementById('panelQ').classList.remove('active');
  document.getElementById('panelP').classList.add('active');
  document.getElementById('headerTitle').textContent=profile.name;
  document.getElementById('headerSub').textContent='Your personalised scoring weights are ready';

  // Save profile to Supabase
  db.from('gamer_profiles').insert({ profile: profile.name, weights: weights }).then(({error}) => {
    if (error) console.warn('Profile save error:', error.message);
  });
}

function buildRatingForm(){
  const grid=document.getElementById('criteriaGrid');
  grid.innerHTML='';
  CRITERIA.forEach(c=>{
    const wPct=Math.round(weights[c.id]*100/6), isHi=weights[c.id]>1.2;
    const div=document.createElement('div');
    div.className='criterion';
    div.innerHTML=`<div class="crit-top"><span class="crit-name">${c.name}</span><span class="crit-badge ${isHi?'hi':''}">${wPct}% weight</span></div><div class="crit-desc">${c.desc}</div><div class="verbal-row" id="vrow-${c.id}"></div><div class="slider-labels"><span>${c.lo}</span><span>${c.hi}</span></div>`;
    grid.appendChild(div);
    renderVerbal(c);
  });
  document.getElementById('overallProfile').textContent=profileLabel;
  updateRadar();
}

function renderVerbal(c){
  const row=document.getElementById('vrow-'+c.id);
  row.innerHTML='';
  c.verbal.forEach((label,i)=>{
    const btn=document.createElement('div');
    btn.className='vbtn'+(scores[c.id]===i+1?' sel':'');
    if(scores[c.id]===i+1) btn.style.background=c.color;
    btn.innerHTML=`${label}<span class="vsub">${i+1}/5</span>`;
    btn.onclick=()=>{ scores[c.id]=i+1; renderVerbal(c); updateRadar(); };
    row.appendChild(btn);
  });
}

function updateRadar(){
  const canvas=document.getElementById('radarCanvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2,maxR=W/2-38,n=CRITERIA.length;
  const isDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridCol=isDark?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.08)';
  const labelCol=isDark?'rgba(255,255,255,0.55)':'#7a7060';
  const angle=i=>(Math.PI*2*i/n)-Math.PI/2;
  const pt=(i,r)=>({x:cx+r*Math.cos(angle(i)),y:cy+r*Math.sin(angle(i))});
  [1,2,3,4,5].forEach(level=>{
    const r=maxR*level/5;
    ctx.beginPath();
    for(let i=0;i<n;i++){const p=pt(i,r);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);}
    ctx.closePath(); ctx.strokeStyle=gridCol; ctx.lineWidth=1; ctx.stroke();
  });
  for(let i=0;i<n;i++){
    ctx.beginPath();ctx.moveTo(cx,cy);const p=pt(i,maxR);ctx.lineTo(p.x,p.y);
    ctx.strokeStyle=gridCol;ctx.lineWidth=1;ctx.stroke();
  }
  const vals=CRITERIA.map(c=>scores[c.id]||0);
  ctx.beginPath();
  CRITERIA.forEach((c,i)=>{const r=maxR*vals[i]/5,p=pt(i,r);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});
  ctx.closePath();ctx.fillStyle='rgba(192,57,43,0.15)';ctx.fill();ctx.strokeStyle='#c0392b';ctx.lineWidth=2;ctx.stroke();
  CRITERIA.forEach((c,i)=>{
    const r=maxR*vals[i]/5,p=pt(i,r);
    if(vals[i]>0){ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle=c.color;ctx.fill();}
  });
  ctx.font='500 10px DM Mono, monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  CRITERIA.forEach((c,i)=>{
    const p=pt(i,maxR+22);ctx.fillStyle=labelCol;ctx.fillText(c.name,p.x,p.y);
    if(vals[i]>0){ctx.fillStyle=c.color;ctx.font='500 9px DM Mono, monospace';const vp=pt(i,maxR+34);ctx.fillText(c.verbal[vals[i]-1],vp.x,vp.y);ctx.font='500 10px DM Mono, monospace';}
  });
  const rated=CRITERIA.filter(c=>scores[c.id]);
  let wavg=null;
  if(rated.length>0){const totalW=rated.reduce((a,c)=>a+weights[c.id],0);wavg=rated.reduce((a,c)=>a+scores[c.id]*weights[c.id],0)/totalW;}
  document.getElementById('overallNum').textContent=wavg?wavg.toFixed(1):'—';
}

const GAMES={
  'wingspan':{e:'🦅',name:'Wingspan',tags:['Engine building','1–5 players','~70 min']},
  'gloomhaven':{e:'⚔️',name:'Gloomhaven',tags:['Campaign','1–4 players','~120 min']},
  'catan':{e:'🏝️',name:'Catan',tags:['Negotiation','3–4 players','~90 min']},
  'terraforming mars':{e:'🚀',name:'Terraforming Mars',tags:['Engine building','1–5 players','~120 min']},
  'pandemic':{e:'🦠',name:'Pandemic',tags:['Cooperative','2–4 players','~60 min']},
  'azul':{e:'🔷',name:'Azul',tags:['Abstract','2–4 players','~45 min']},
  'scythe':{e:'⚙️',name:'Scythe',tags:['Area control','1–5 players','~115 min']},
  'spirit island':{e:'🌿',name:'Spirit Island',tags:['Cooperative','1–4 players','~120 min']},
};

function loadGame(){
  const val=document.getElementById('gameInput').value.trim().toLowerCase();
  const g=GAMES[val]||{e:'🎲',name:document.getElementById('gameInput').value.trim()||'Unknown Game',tags:['?']};
  document.getElementById('gameThumb').textContent=g.e;
  document.getElementById('gameNameD').textContent=g.name;
  document.getElementById('gameTagsD').innerHTML=g.tags.map(t=>`<span class="gtag">${t}</span>`).join('');
  document.getElementById('gameCard').style.display='flex';
}

function showToast(msg, type='success') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast ${type} show`;
  setTimeout(() => toast.classList.remove('show'), 3000);
}

async function submitRating(){
  const gameName = document.getElementById('gameInput').value.trim();
  const allRated = CRITERIA.every(c => scores[c.id] !== null);
  const validationMsg = document.getElementById('validationMsg');

  if (!gameName || !allRated) {
    validationMsg.classList.add('show');
    return;
  }
  validationMsg.classList.remove('show');

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = 'SAVING…';

  const rated = CRITERIA.filter(c => scores[c.id]);
  const totalW = rated.reduce((a,c) => a+weights[c.id], 0);
  const wavg = rated.reduce((a,c) => a+scores[c.id]*weights[c.id], 0) / totalW;

  const { error } = await db.from('ratings').insert({
    game_name:     gameName,
    profile:       profileLabel,
    complexity:    scores.complexity,
    depth:         scores.depth,
    luck:          scores.luck,
    interaction:   scores.interaction,
    table_exp:     scores.table,
    production:    scores.production,
    weighted_score: parseFloat(wavg.toFixed(2)),
    notes:         document.getElementById('notes').value.trim() || null,
  });

  btn.disabled = false;
  btn.textContent = 'SUBMIT RATING';

  if (error) {
    console.error(error);
    showToast('Something went wrong. Please try again.', 'error');
  } else {
    showToast('Rating saved ✓', 'success');
    setTimeout(() => resetRating(), 1500);
  }
}

function resetRating(){
  document.getElementById('gameInput').value='';
  document.getElementById('gameCard').style.display='none';
  document.getElementById('notes').value='';
  document.getElementById('validationMsg').classList.remove('show');
  CRITERIA.forEach(c=>{scores[c.id]=null;renderVerbal(c);});
  updateRadar();
}

function setStep(n){
  ['step-q','step-p','step-r'].forEach((id,i)=>{
    document.getElementById(id).className='step'+(i+1<n?' done':i+1===n?' active':'');
  });
}

function goToRating(){
  buildRatingForm();setStep(3);
  document.getElementById('panelP').classList.remove('active');
  document.getElementById('panelR').classList.add('active');
  document.getElementById('headerTitle').textContent='Rate a Game';
  document.getElementById('headerSub').textContent='Scoring weighted to your gamer profile';
}

function retakeQuiz(){
  currentQ=0;answers=[];
  for(let i=0;i<QUESTIONS.length;i++) answers.push(QUESTIONS[i].type==='multi'?new Set():null);
  initWeights();setStep(1);
  ['panelP','panelR'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById('panelQ').classList.add('active');
  document.getElementById('headerTitle').textContent='Your Gamer Profile';
  document.getElementById('headerSub').textContent='A quick questionnaire to personalise your score weights';
  renderQ();
}

renderQ();
</script>
